# git-cliff configuration. Generates CHANGELOG.md and the GitHub Release body
# from conventional-commit messages on `main`, driven by .github/workflows.
# Mirrors the Agent of Empires core setup.

[changelog]
header = """
# Changelog

All notable changes to {{ cookiecutter.plugin_name }} will be documented in this file.

The format follows [Conventional Commits](https://www.conventionalcommits.org/).

"""
body = """
{% raw %}{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | split(pat="\n") | first | upper_first }}
{% endfor %}
{% endfor %}{% endraw %}"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
protect_breaking_commits = true

commit_preprocessors = [
  # Strip the trailing " (#1234)" GitHub appends to squash-merge subjects.
  { pattern = '(?m) \(#\d+\)$', replace = "" },
]

commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^security", group = "Security" },
  { message = "^revert", group = "Reverts" },
  { message = "^chore\\(deps\\)", skip = true },
  { message = "^chore", skip = true },
  { message = "^build", skip = true },
  { message = "^ci", skip = true },
  { message = "^docs", skip = true },
  { message = "^style", skip = true },
  { message = "^refactor", skip = true },
  { message = "^test", skip = true },
  # Catch-all so a non-conventional commit lands in "Other" instead of vanishing.
  { message = ".*", group = "Other" },
]
